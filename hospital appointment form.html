<!DOCTYPE html>
<html>
    <head>
        <title>Hospital Appointment Form</title>
    </head>
    <body>
        <form>
            <fieldset>
                <legend>Hospital appintment form</legend>
                <label>Patient name:</label>
                <input type="text"><br><br>
                <label>Age:</label>
                <input type="number"><br><br>
                <label>Gender:</label>
                <input type="radio" name="gender">Male
                <input type="radio" name="gender">Female<br><br>
                <label>Doctor:</label>
                <select>
                    <option>Dr. Ajay</option>
                    <option>Dr. Nihan</option>
                    <option>Dr. Karuna</option>
                    <option>Dr. Geetha</option>
                </select><br><br>
                <label>Appointment date:</label>
                <input type="date"><br><br>
                <label>Time slot:</label>
                <input type="time"><br><br>
                <label>Symptoms:</label><br>
                <textarea rows="5" cols="40"></textarea><br><br>
                <label>Emergency contact:</label>
                <input type="tel"><br><br>
                <input type="submit" value="Book appoointment">
            </fieldset>
        </form>
    </body>
</html>
